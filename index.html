<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#7C0116" />

    <!-- SEO & Robots -->
    <meta name="description" content="Craveora - Premium luxury gourmet food ordering and fine dining reservation platform." />
    <meta name="keywords" content="Craveora, Gourmet food, Premium Restaurant, Online Food Ordering, Fine Dining, Luxury Food Platform" />
    <meta name="author" content="Aditya Mishra" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Craveora | Premium Restaurant Ordering" />
    <meta property="og:description" content="Indulge in premium luxury food ordering and fine dining reservations with Craveora." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://craveora.com" />
    <meta property="og:image" content="https://craveora.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Craveora | Premium Gourmet Platform" />
    <meta name="twitter:description" content="Indulge in luxury gourmet food ordering with the Craveora platform." />
    <meta name="twitter:image" content="https://craveora.com/og-image.jpg" />

    <!-- JSON-LD Structured Data Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Craveora",
        "description": "Premium luxury gourmet food ordering and reservation platform.",
        "url": "https://craveora.com",
        "logo": "https://craveora.com/logo.png",
        "priceRange": "$$$",
        "servesCuisine": "Gourmet, Luxury Cuisine, Continental, Italian",
        "paymentAccepted": "Credit Card, Debit Card, UPI, Digital Wallets"
      }
    </script>

    <!-- Favicon -->
    <!-- Replace this once we create the brand logo -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Title -->
    <title>Craveora | Premium Restaurant Experience</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
